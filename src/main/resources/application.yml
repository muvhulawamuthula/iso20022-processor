spring:
  application:
    name: iso20022-processor
  profiles:
    # `local` (H2, in-memory) is the default so `mvn spring-boot:run` and the test suite need no
    # external services. The container runs with SPRING_PROFILES_ACTIVE=postgres (durable store).
    default: local

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  metrics:
    tags:
      application: iso20022-processor

server:
  port: 8080
  shutdown: graceful

logging:
  level:
    com.muvhulawa.payments: INFO
  # Carry the pacs.008 MsgId on every log line for that message via MDC, so a single payment
  # can be traced end to end across the pipeline. Behind Kong this pairs with X-Correlation-ID.
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [msgId=%X{msgId:-}] %logger{36} - %msg%n"
