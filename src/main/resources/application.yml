spring:
  application:
    name: iso20022-processor
  datasource:
    url: jdbc:h2:mem:ledger;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true   # http://localhost:8080/h2-console  (JDBC URL: jdbc:h2:mem:ledger)

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  metrics:
    tags:
      application: iso20022-processor

server:
  port: 8080

logging:
  level:
    com.muvhulawa.payments: INFO
  # Carry the pacs.008 MsgId on every log line for that message via MDC, so a single payment
  # can be traced end to end across the pipeline.
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [msgId=%X{msgId:-}] %logger{36} - %msg%n"
